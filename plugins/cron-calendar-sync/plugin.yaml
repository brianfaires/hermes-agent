name: cron-calendar-sync
version: 1.0.0
description: "Profile-local cron-to-Calendar reconciliation via CREATE/UPDATE/REMOVE/COMPLETE hooks. Preserves user-edited titles, keeps one all-day series for high-frequency jobs, archives ended series, recovers managed events, attaches sanitized run output, and learns event duration. Best-effort; requires each profile's own google-workspace skill/token."
author: "brian"
# Note: cron lifecycle hooks (cron.hooks) are not standard agent hooks, so they
# are registered programmatically in register(ctx) rather than declared here.
